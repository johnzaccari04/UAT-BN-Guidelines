name: Check guideline links

on:
  push:
    branches: [main]
    paths:
      - 'guidelines.json'
  schedule:
    # 20:00 UTC = 6 AM Sydney AEST / 7 AM Sydney AEDT (accepts +/- 1hr DST drift).
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run link checker
        id: check
        run: python .github/scripts/check_links.py

      - name: Commit config.json if changed
        if: steps.check.outputs.config_changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config.json
          git commit -m "Auto: update link check state [skip ci]"
          git push

      # ─── Email: failure (push trigger, links broken) ──────────────────────
      - name: Email failure (push trigger)
        if: >-
          github.event_name == 'push' &&
          steps.check.outputs.all_pass == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: uat.johnzaccari04@gmail.com
          password: ${{ secrets.UAT }}
          from: UAT BN Guidelines <uat.johnzaccari04@gmail.com>
          to: johnzaccari04@gmail.com, john.zaccari@asic.gov.au
          subject: "[UAT BN Guidelines] ${{ steps.check.outputs.broken_count }} broken link(s) detected"
          html_body: |
            <p>Hi,</p>
            <p>The link checker ran after a recent push and detected <strong>${{ steps.check.outputs.broken_count }}</strong> broken link(s). The site has been put into maintenance mode.</p>
            ${{ steps.check.outputs.broken_html }}
            <p>Once the issue is resolved, push an update to <code>guidelines.json</code> and the site will unlock automatically.</p>
            <p><a href="https://johnzaccari04.github.io/UAT-BN-Guidelines/">Open the site</a></p>

      # ─── Email: failure (scheduled / manual run, links broken) ────────────
      - name: Email failure (scheduled run)
        if: >-
          github.event_name != 'push' &&
          steps.check.outputs.all_pass == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: uat.johnzaccari04@gmail.com
          password: ${{ secrets.UAT }}
          from: UAT BN Guidelines <uat.johnzaccari04@gmail.com>
          to: johnzaccari04@gmail.com, john.zaccari@asic.gov.au
          subject: "[UAT BN Guidelines] Daily check — ${{ steps.check.outputs.broken_count }} broken link(s)"
          html_body: |
            <p>Hi,</p>
            <p>The daily link check found <strong>${{ steps.check.outputs.broken_count }}</strong> broken link(s). The site has been put into maintenance mode.</p>
            ${{ steps.check.outputs.broken_html }}
            <p>Once the issue is resolved, push an update to <code>guidelines.json</code> and the site will unlock automatically.</p>
            <p><a href="https://johnzaccari04.github.io/UAT-BN-Guidelines/">Open the site</a></p>

      # ─── Email: success (scheduled / manual run only) ────────────────────
      - name: Email success (scheduled run)
        if: >-
          github.event_name != 'push' &&
          steps.check.outputs.all_pass == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: uat.johnzaccari04@gmail.com
          password: ${{ secrets.UAT }}
          from: UAT BN Guidelines <uat.johnzaccari04@gmail.com>
          to: johnzaccari04@gmail.com, john.zaccari@asic.gov.au
          subject: "[UAT BN Guidelines] Daily check — all links healthy"
          html_body: |
            <p>Hi,</p>
            <p>The daily link check ran and <strong>all guideline links are healthy</strong>.</p>
            <p><a href="https://johnzaccari04.github.io/UAT-BN-Guidelines/">Open the site</a></p>
